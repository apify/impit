name: "[impit-node] Release to npm"
env:
  DEBUG: napi:*
  APP_NAME: impit-node
  MACOSX_DEPLOYMENT_TARGET: '10.13'
  RUSTFLAGS: '--cfg reqwest_unstable'
permissions:
  contents: write
  id-token: write
on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Bump version'
        required: true
        type: choice
        default: 'patch'
        options:
          - 'major'
          - 'minor'
          - 'patch'

jobs:
    test:
        name: Build and test
        uses: ./.github/workflows/node-test.yaml
        secrets: inherit

    publish:
        outputs:
          bumped-version-commit-sha: ${{ steps.commit.outputs.commit-sha || github.sha }}
          new_version: ${{ steps.get-new-version.outputs.TARGET_VERSION }}
        defaults:
          run:
            working-directory: impit-node
        name: Publish
        runs-on: ubuntu-latest
        needs: [test]
        steps:
          - uses: actions/checkout@v6
            with:
              token: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}

          - name: Setup node
            uses: actions/setup-node@v6
            with:
              node-version: 24
              registry-url: 'https://registry.npmjs.org'

          - name: Install pnpm and dependencies
            uses: apify/workflows/pnpm-install@main
            with:
              working-directory: impit-node

          - name: Download all artifacts
            uses: actions/download-artifact@v8
            with:
              path: artifacts

          - name: Move artifacts
            run: pnpm artifacts

          - name: List packages
            run: ls -R ./npm
            shell: bash

          - name: Calculate version
            id: get-new-version
            run: |
              echo "TARGET_VERSION=$(pnpm dlx semver --increment ${{ github.event.inputs.bump }} $(npm show impit version))" >> "$GITHUB_OUTPUT"

          - name: Set version
            run: |
              pnpm version --no-git-tag-version ${{ steps.get-new-version.outputs.TARGET_VERSION }}
              pnpm copy-version

          - name: Publish to npm
            run: pnpm publish --no-git-checks --provenance

          - name: Update lockfile
            run: |
              for i in $(seq 1 5); do
                pnpm install --lockfile-only && exit 0
                [ $i -lt 5 ] && echo "Attempt $i failed, waiting 30s before retry..." && sleep 30
              done
              exit 1

          - name: Stage changes
            working-directory: .
            run: |
              git pull --rebase --autostash
              git add -A

          - name: Commit changes
            id: commit
            uses: apify/workflows/commit@v0.44.0
            with:
                commit-message: "chore(js-release): Update package version [skip ci]"
                github-token: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}

          - name: Create version tag
            working-directory: .
            env:
              GH_TOKEN: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}
              TAG_NAME: "js-${{ steps.get-new-version.outputs.TARGET_VERSION }}"
              COMMIT_SHA: ${{ steps.commit.outputs.commit-sha }}
            run: |
              gh api -X POST "repos/${GITHUB_REPOSITORY}/git/refs" \
                -f ref="refs/tags/${TAG_NAME}" \
                -f sha="${COMMIT_SHA}"

    changelog:
      name: Generate changelog
      needs: [publish]
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v6
          with:
            token: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}
            fetch-depth: 0
            ref: master

        - name: Generate a changelog
          uses: orhun/git-cliff-action@v4
          id: git-cliff
          with:
            config: cliff.toml
            args: --ignore-tags="(py|cli)-*" --include-path="./impit-node/**" --include-path="./impit/**"
          env:
            OUTPUT: impit-node/CHANGELOG.md
            GITHUB_REPO: ${{ github.repository }}

        - name: Stage new changelog
          id: stage_changelog
          run: |
            git pull --rebase --autostash
            git add impit-node/CHANGELOG.md
            if git diff --cached --quiet; then
              echo "has-changes=false" >> "$GITHUB_OUTPUT"
            else
              echo "has-changes=true" >> "$GITHUB_OUTPUT"
            fi

        - name: Commit new changelog
          id: commit_changelog
          if: steps.stage_changelog.outputs.has-changes == 'true'
          uses: apify/workflows/commit@v0.44.0
          with:
            commit-message: "docs: update changelog [skip ci]"
            github-token: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}

        - name: Create release
          uses: softprops/action-gh-release@v2
          with:
            tag_name: "js-${{ needs.publish.outputs.new_version }}"
            name: "impit-node@${{ needs.publish.outputs.new_version }}"
            target_commitish: ${{ needs.publish.outputs.bumped-version-commit-sha }}
            body: ${{ steps.git-cliff.outputs.content }}
